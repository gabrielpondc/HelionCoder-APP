name: Build desktop app

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            name: macos-arm64
            rust-target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app
          - platform: macos-latest
            name: macos-x64
            rust-target: x86_64-apple-darwin
            args: --target x86_64-apple-darwin --bundles app
          - platform: ubuntu-22.04
            name: linux
            rust-target: ""
            args: ""
          - platform: windows-2022
            name: windows
            rust-target: ""
            args: ""
          - platform: windows-11-arm
            name: windows-arm64
            rust-target: aarch64-pc-windows-msvc
            args: --target aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Verify release version
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          TAURI_VERSION="$(node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8')).version)")"
          CARGO_VERSION="$(node -e "const fs = require('fs'); const text = fs.readFileSync('src-tauri/Cargo.toml', 'utf8'); const match = text.match(/^version = \"([^\"]+)\"$/m); if (!match) process.exit(2); console.log(match[1])")"
          TAG="v${VERSION}"

          if [ "$VERSION" != "$LOCK_VERSION" ] || [ "$VERSION" != "$TAURI_VERSION" ] || [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "Version mismatch: package.json=${VERSION}, package-lock.json=${LOCK_VERSION}, tauri.conf.json=${TAURI_VERSION}, Cargo.toml=${CARGO_VERSION}." >&2
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "${GITHUB_REF_NAME:-}" != "$TAG" ]; then
            echo "Git tag (${GITHUB_REF_NAME}) does not match package version tag (${TAG})." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        if: matrix.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: HelionCoder Desktop ${{ steps.version.outputs.tag }}
          releaseBody: Desktop release for HelionCoder ${{ steps.version.outputs.tag }}.
          releaseDraft: false
          prerelease: false
          releaseCommitish: ${{ github.sha }}
          generateReleaseNotes: true
          tauriScript: npm run tauri
          args: ${{ matrix.args }}
          assetNamePattern: HelionCoder_[version]_[platform]_[arch][setup].[ext]
